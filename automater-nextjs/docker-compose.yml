services:
  postgres:
    image: postgres:15
    ports:
      - "5434:5432"
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    env_file:
      - .env.production

volumes:
  postgres_data: