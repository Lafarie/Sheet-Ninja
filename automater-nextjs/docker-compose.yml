services:
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: automater
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: "postgresql://postgres:password@postgres:5432/automater"
      NEXTAUTH_URL: "http://localhost:3000"
      ENCRYPTION_KEY: "abcdef1234567890abcdef1234567890"
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "your-secret-key-here-please-change-in-production-make-it-long-and-secure"

volumes:
  postgres_data: