apiVersion: v1
kind: Service
metadata:
  name: gitlab-proxy-service
  namespace: sprout
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: gitlab-proxy

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab-proxy
  namespace: sprout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitlab-proxy
  template:
    metadata:
      labels:
        app: gitlab-proxy
    spec:
      containers:
      - name: gitlab-proxy
        image: nginx:alpine
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: nginx-config
        configMap:
          name: gitlab-proxy-config

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitlab-proxy-config
  namespace: sprout
data:
  nginx.conf: |
    events {
      worker_connections 1024;
    }
    http {
      server {
        listen 8080;
        location / {
          proxy_pass https://sourcecontrol.hsenidmobile.com;
          proxy_set_header Host sourcecontrol.hsenidmobile.com;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }
    } 