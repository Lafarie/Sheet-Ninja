<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheets JSON Upload</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .section-title {
            color: #333;
            font-size: 1.4em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .upload-area {
            border: 3px dashed #007bff;
            border-radius: 10px;
            padding: 40px 20px;
            text-align: center;
            background: #f8f9fa;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #0056b3;
            background: #e7f3ff;
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            border-color: #28a745;
            background: #d4edda;
        }

        .upload-icon {
            font-size: 3em;
            color: #007bff;
            margin-bottom: 15px;
        }

        .upload-text {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 10px;
        }

        .upload-subtext {
            color: #666;
            font-size: 0.9em;
        }

        .file-input {
            display: none;
        }

        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px 5px;
        }

        .btn:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #28a745;
        }

        .btn-success:hover {
            background: #1e7e34;
        }

        .textarea-json {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            resize: vertical;
            margin-bottom: 15px;
        }

        .textarea-json:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        .status-message {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }

        .status-success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .status-error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .status-info {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }

        .file-info {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            display: none;
        }

        .file-info h4 {
            color: #333;
            margin-bottom: 10px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }

        .info-label {
            font-weight: bold;
            color: #555;
        }

        .info-value {
            color: #333;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
                margin: 10px;
            }

            .header h1 {
                font-size: 2em;
            }

            .upload-area {
                padding: 30px 15px;
            }

            .btn {
                width: 100%;
                margin: 5px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📤 JSON File Upload</h1>
            <p>Upload your Google Sheets API service account credentials</p>
        </div>

        <div class="upload-section">
            <h3 class="section-title">
                <span>🔐</span> Service Account JSON File
            </h3>

            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">☁️</div>
                <div class="upload-text">Drag & Drop JSON File or Click to Browse</div>
                <div class="upload-subtext">Supports .json files only</div>
                <input type="file" id="fileInput" class="file-input" accept=".json">
            </div>

            <button class="btn" onclick="document.getElementById('fileInput').click()">
                📁 Choose File
            </button>
        </div>

        <div class="upload-section">
            <h3 class="section-title">
                <span>📝</span> Or Paste JSON Content
            </h3>
            <textarea id="jsonPaste" class="textarea-json" placeholder="Paste your service account JSON content here..."></textarea>
            <button class="btn btn-success" onclick="processJSON()">
                ✅ Process JSON
            </button>
        </div>

        <div id="statusMessage" class="status-message"></div>
        <div id="fileInfo" class="file-info"></div>
    </div>

    <script>
        // Global variables
        let uploadedJSON = null;

        // Initialize drag and drop functionality
        document.addEventListener('DOMContentLoaded', function() {
            setupFileUpload();
        });

        function setupFileUpload() {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');

            // Prevent default drag behaviors
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                uploadArea.addEventListener(eventName, preventDefaults, false);
                document.body.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            // Highlight drop area when item is dragged over it
            ['dragenter', 'dragover'].forEach(eventName => {
                uploadArea.addEventListener(eventName, () => {
                    uploadArea.classList.add('dragover');
                }, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                uploadArea.addEventListener(eventName, () => {
                    uploadArea.classList.remove('dragover');
                }, false);
            });

            // Handle dropped files
            uploadArea.addEventListener('drop', handleDrop, false);

            // Handle file input change
            fileInput.addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    handleFile(e.target.files[0]);
                }
            });
        }

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            
            if (files.length > 0) {
                handleFile(files[0]);
            }
        }

        function handleFile(file) {
            // Validate file type
            if (!file.name.toLowerCase().endsWith('.json')) {
                showStatus('Please upload a JSON file only.', 'error');
                return;
            }

            // Validate file size (max 1MB)
            if (file.size > 1024 * 1024) {
                showStatus('File too large. Please upload a file smaller than 1MB.', 'error');
                return;
            }

            showStatus('Reading file...', 'info');

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const jsonContent = e.target.result;
                    const parsedJSON = JSON.parse(jsonContent);
                    
                    // Update textarea with file content
                    document.getElementById('jsonPaste').value = JSON.stringify(parsedJSON, null, 2);
                    
                    // Process the JSON
                    processJSONContent(parsedJSON, file.name);
                    
                } catch (error) {
                    showStatus(`Error reading JSON file: ${error.message}`, 'error');
                }
            };

            reader.onerror = function() {
                showStatus('Error reading file. Please try again.', 'error');
            };

            reader.readAsText(file);
        }

        function processJSON() {
            const jsonContent = document.getElementById('jsonPaste').value.trim();
            
            if (!jsonContent) {
                showStatus('Please provide JSON content.', 'error');
                return;
            }

            try {
                const parsedJSON = JSON.parse(jsonContent);
                processJSONContent(parsedJSON, 'Pasted Content');
            } catch (error) {
                showStatus(`Invalid JSON format: ${error.message}`, 'error');
            }
        }

        function processJSONContent(jsonData, source) {
            try {
                // Validate required Google Service Account fields
                const requiredFields = [
                    'type',
                    'project_id',
                    'private_key_id',
                    'private_key',
                    'client_email',
                    'client_id',
                    'auth_uri',
                    'token_uri'
                ];

                const missingFields = requiredFields.filter(field => !jsonData[field]);
                
                if (missingFields.length > 0) {
                    showStatus(`Missing required fields: ${missingFields.join(', ')}`, 'error');
                    return;
                }

                // Validate service account type
                if (jsonData.type !== 'service_account') {
                    showStatus('This appears to be a different type of credential file. Please upload a Service Account JSON file.', 'error');
                    return;
                }

                // Store the valid JSON
                uploadedJSON = jsonData;

                // Show success message
                showStatus('✅ Valid Google Service Account JSON detected!', 'success');

                // Display file information
                displayFileInfo(jsonData, source);

            } catch (error) {
                showStatus(`Error processing JSON: ${error.message}`, 'error');
            }
        }

        function displayFileInfo(jsonData, source) {
            const fileInfoDiv = document.getElementById('fileInfo');
            
            const infoHTML = `
                <h4>📋 Service Account Information</h4>
                <div class="info-item">
                    <span class="info-label">Source:</span>
                    <span class="info-value">${source}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Type:</span>
                    <span class="info-value">${jsonData.type}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Project ID:</span>
                    <span class="info-value">${jsonData.project_id}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Client Email:</span>
                    <span class="info-value">${jsonData.client_email}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Client ID:</span>
                    <span class="info-value">${jsonData.client_id}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Status:</span>
                    <span class="info-value" style="color: #28a745; font-weight: bold;">✅ Valid</span>
                </div>
            `;
            
            fileInfoDiv.innerHTML = infoHTML;
            fileInfoDiv.style.display = 'block';
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.className = `status-message status-${type}`;
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';

            // Auto-hide success messages after 5 seconds
            if (type === 'success') {
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 5000);
            }
        }

        // Download functionality
        function downloadJSON() {
            if (!uploadedJSON) {
                showStatus('No JSON data to download.', 'error');
                return;
            }

            const jsonContent = JSON.stringify(uploadedJSON, null, 2);
            const blob = new Blob([jsonContent], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'service_account.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showStatus('📥 JSON file downloaded successfully!', 'success');
        }

        // Clear functionality
        function clearAll() {
            document.getElementById('jsonPaste').value = '';
            document.getElementById('fileInput').value = '';
            document.getElementById('statusMessage').style.display = 'none';
            document.getElementById('fileInfo').style.display = 'none';
            uploadedJSON = null;
            
            showStatus('🔄 All data cleared.', 'info');
        }
    </script>
</body>
</html>
